{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Set New Password</title>
    
    <link rel="stylesheet" href="{% static 'css/design_system.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: var(--surface-secondary); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: var(--space-4);">

    <div class="auth-card" style="width: 100%; max-width: 400px; padding: var(--space-8); box-sizing: border-box;">
        
        <div style="text-align: center; margin-bottom: var(--space-6);">
            <h1 class="text-2xl font-bold text-neutral-900 m-0 mb-1">Welcome!</h1>
            <p class="text-sm text-neutral-500 m-0">Please set a permanent password for your account to continue.</p>
        </div>

        {% if messages %}
            <div class="mb-4">
                {% for message in messages %}
                    <div class="ds-alert ds-alert-error">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" action="{% url 'driver_set_password' %}">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-input" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="margin-top: var(--space-2);">Set Password</button>
        </form>
    </div>

</body>
</html>
