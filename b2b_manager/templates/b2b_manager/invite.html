{% load static i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Accept Manager Invitation" %}</title>
    
    <link rel="stylesheet" href="{% static 'css/design_system.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body style="background-color: var(--surface-secondary); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: var(--space-4);">

    <div class="auth-card" style="width: 100%; max-width: 400px; padding: var(--space-8); box-sizing: border-box;">
        <h2 class="text-2xl font-bold text-neutral-900 mt-0 mb-1">{% trans "Welcome to" %} {{ manager.company.company_name }}</h2>
        <p class="text-sm text-neutral-500 m-0 mb-6">{% trans "Set your password to activate your manager account." %}</p>
        
        {% if messages %}
            <div class="mb-4">
            {% for message in messages %}
                <div class="ds-alert ds-alert-error">{{ message }}</div>
            {% endfor %}
            </div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">{% trans "Email (Username)" %}</label>
                <input type="text" value="{{ manager.email }}" class="form-input" disabled style="background-color: var(--color-neutral-100); color: var(--color-neutral-500);">
            </div>
            <div class="form-group">
                <label class="form-label">{% trans "Password" %}</label>
                <input type="password" name="password" class="form-input" required minlength="6">
            </div>
            <div class="form-group">
                <label class="form-label">{% trans "Confirm Password" %}</label>
                <input type="password" name="confirm_password" class="form-input" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary w-full" style="margin-top: var(--space-2);">{% trans "Activate Account" %}</button>
        </form>
    </div>

</body>
</html>
